name: Release EV3 build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n1)"

          if [ -z "${latest_tag}" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          next_tag="v${major}.${minor}.$((patch + 1))"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Install ARM toolchain and OpenCV headers
        run: |
          set -euo pipefail

          sudo dpkg --add-architecture armel
          sudo apt-get update

          sudo apt-get install -y \
            gcc-arm-linux-gnueabi \
            g++-arm-linux-gnueabi \
            pkg-config \
            libc6-dev-armel-cross \
            libstdc++-12-dev-armel-cross \
            libopencv-dev:armel

      - name: Build GoCV binary for EV3
        run: |
          set -euo pipefail
          mkdir -p dist

          export CGO_ENABLED=1
          export GOOS=linux
          export GOARCH=arm
          export GOARM=5

          export CC=arm-linux-gnueabi-gcc
          export CXX=arm-linux-gnueabi-g++

          export PKG_CONFIG_PATH="/usr/lib/arm-linux-gnueabi/pkgconfig:/usr/share/pkgconfig"
          export PKG_CONFIG_LIBDIR="/usr/lib/arm-linux-gnueabi/pkgconfig:/usr/share/pkgconfig"

          export CGO_CFLAGS="$(pkg-config --cflags opencv4)"
          export CGO_CXXFLAGS="$(pkg-config --cflags opencv4)"
          export CGO_LDFLAGS="$(pkg-config --libs opencv4)"

          go version
          pkg-config --modversion opencv4
          pkg-config --cflags opencv4
          pkg-config --libs opencv4

          go mod download
          go build -v -trimpath -ldflags="-s -w" -o dist/bot-ev3 .

          file dist/bot-ev3

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release and upload binary
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.next_tag }}
          PREV_TAG: ${{ steps.version.outputs.latest_tag }}
        run: |
          set -euo pipefail

          FILE="dist/bot-ev3"

          if [ "${PREV_TAG}" = "v0.0.0" ]; then
            NOTES="Initial release ${TAG}"
          else
            NOTES="Automated release ${TAG} (previous: ${PREV_TAG})"
          fi

          gh release create "${TAG}" \
            "${FILE}" \
            --title "${TAG}" \
            --notes "${NOTES}"