name: Release EV3 build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: 1
      GOOS: linux
      GOARCH: arm
      GOARM: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Set up QEMU (required for ARM containers)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag="$(git tag -l 'v*' --sort=-v:refname | head -n1)"

          if [ -z "${latest_tag}" ]; then
            latest_tag="v0.0.0"
          fi

          version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version"
          next_tag="v${major}.${minor}.$((patch + 1))"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Build GoCV binary for EV3
        run: |
          set -euo pipefail
          mkdir -p dist

          docker run --rm \
            --platform linux/arm/v5 \
            -v "$PWD:/src" \
            -w /src \
            arm32v5/golang:bookworm \
            bash -lc '
              set -euo pipefail

              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                pkg-config \
                libopencv-dev \
                file \
                ca-certificates \
                git

              export CGO_ENABLED=1
              export GOOS=linux
              export GOARCH=arm
              export GOARM=5

              go mod download
              go build -trimpath -ldflags="-s -w" -o dist/bot-ev3 .

              file dist/bot-ev3
            '

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release and upload binary
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.next_tag }}
          PREV_TAG: ${{ steps.version.outputs.latest_tag }}
        run: |
          set -euo pipefail

          FILE="dist/bot-ev3"

          if [ "${PREV_TAG}" = "v0.0.0" ]; then
            NOTES="Initial release ${TAG}"
          else
            NOTES="Automated release ${TAG} (previous: ${PREV_TAG})"
          fi

          gh release create "${TAG}" \
            "${FILE}" \
            --title "${TAG}" \
            --notes "${NOTES}"